# Nginx reverse proxy for the LogixaLab Next.js app (Hostinger VPS).
#
# This is the piece that PERMANENTLY fixes the intermittent missing-CSS bug:
# Nginx terminates TLS, serves the hashed static assets (/_next/static/*) with
# long-lived immutable caching, and proxies everything else to `next start` on
# localhost:3000. Static chunks no longer depend on the Node process being
# perfectly healthy on every request.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/logixalab.conf
#   sudo ln -s /etc/nginx/sites-available/logixalab.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then add HTTPS with: sudo certbot --nginx -d logixalab.com -d www.logixalab.com

# --- HTTP: redirect to HTTPS (certbot will also manage this block) ---
server {
    listen 80;
    listen [::]:80;
    server_name logixalab.com www.logixalab.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name logixalab.com www.logixalab.com;

    # TLS certs (managed by certbot once you run the command above)
    # ssl_certificate     /etc/letsencrypt/live/logixalab.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/logixalab.com/privkey.pem;

    # Absolute path to the project on the VPS (adjust to your deploy path):
    root /var/www/logixalab/public;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Next.js build assets are content-hashed → cache them hard.
    location /_next/static/ {
        alias /var/www/logixalab/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Files in /public (images, favicons, manifest, etc.)
    location /images/ {
        alias /var/www/logixalab/public/images/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Everything else → the Next.js server (pages, /api/contact, etc.)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 2m;
}
